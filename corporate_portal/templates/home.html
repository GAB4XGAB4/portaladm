{% extends 'base.html' %}

{% block title %}Home - PsicoNote{% endblock %}

{% block content %}
<div id="carrossel-app"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function Carrossel() {
    const noticias = [
        {% for noticia in noticias %}
        {
            id: {{ noticia.id }},
            titulo: "{{ noticia.titulo }}",
            descricao: "{{ noticia.descricao }}",
            imagem: "{{ noticia.imagem.url }}" || null,
            ordem: {{ noticia.ordem }}
        }{{ forloop.comma }}
        {% endfor %}
    ];

    const [indiceAtual, setIndiceAtual] = useState(0);
    const [isAutoPlay, setIsAutoPlay] = useState(true);

    useEffect(() => {
        if (!isAutoPlay) return;
        const intervalo = setInterval(() => {
            setIndiceAtual((prev) => (prev + 1) % noticias.length);
        }, 5000);
        return () => clearInterval(intervalo);
    }, [isAutoPlay, noticias.length]);

    const anterior = () => {
        setIndiceAtual((prev) => (prev - 1 + noticias.length) % noticias.length);
        setIsAutoPlay(false);
    };

    const proximo = () => {
        setIndiceAtual((prev) => (prev + 1) % noticias.length);
        setIsAutoPlay(false);
    };

    const irParaSlide = (indice) => {
        setIndiceAtual(indice);
        setIsAutoPlay(false);
    };

    const noticia = noticias[indiceAtual] || noticias[0];

    return (
        <div className="space-y-8">
            {/* Carrossel Principal */}
            <div className="carousel-container">
                <div className="relative h-96 bg-gradient-to-r from-slate-900 to-slate-800 flex items-center">
                    {/* Imagem */}
                    <div className="absolute inset-0 w-2/3 h-full overflow-hidden">
                        {noticia.imagem ? (
                            <img 
                                src={noticia.imagem} 
                                alt={noticia.titulo}
                                className="w-full h-full object-cover transition-transform hover:scale-105"
                            />
                        ) : (
                            <div className="w-full h-full bg-gradient-to-br from-purple-600 to-cyan-600 flex items-center justify-center">
                                <div className="text-center text-white">
                                    <i className="fas fa-image text-6xl mb-4"></i>
                                    <p>Imagem não disponível</p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Informações */}
                    <div className="carousel-info absolute inset-0 w-1/3 right-0 p-8 flex flex-col justify-center text-white">
                        <h2 className="text-3xl font-bold mb-4 line-clamp-2">{noticia.titulo}</h2>
                        <p className="text-gray-300 text-sm leading-relaxed line-clamp-4">{noticia.descricao}</p>
                        <div className="mt-6">
                            <button className="btn-primary px-6 py-2 rounded-lg transition-all hover:scale-105">
                                Leia Mais
                            </button>
                        </div>
                    </div>

                    {/* Botões de Navegação */}
                    <button 
                        onClick={anterior}
                        className="absolute left-4 top-1/2 -translate-y-1/2 z-10 w-12 h-12 bg-black bg-opacity-50 hover:bg-opacity-75 text-white rounded-full flex items-center justify-center transition transform hover:scale-110"
                    >
                        <i className="fas fa-chevron-left"></i>
                    </button>
                    <button 
                        onClick={proximo}
                        className="absolute right-4 top-1/2 -translate-y-1/2 z-10 w-12 h-12 bg-black bg-opacity-50 hover:bg-opacity-75 text-white rounded-full flex items-center justify-center transition transform hover:scale-110"
                    >
                        <i className="fas fa-chevron-right"></i>
                    </button>

                    {/* Indicadores */}
                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-10">
                        {noticias.map((_, indice) => (
                            <button
                                key={indice}
                                onClick={() => irParaSlide(indice)}
                                className={`indicator rounded-full transition-all ${
                                    indice === indiceAtual 
                                        ? 'w-8 h-3' 
                                        : 'w-3 h-3 bg-white bg-opacity-40 hover:bg-opacity-60'
                                }`}
                            />
                        ))}
                    </div>
                </div>
            </div>

            {/* Grid de Informações */}
            <div className="grid grid-cols-3 gap-6">
                {[
                    { icon: 'chart-line', title: 'Desempenho', desc: 'Acompanhe métricas em tempo real' },
                    { icon: 'users', title: 'Equipe', desc: 'Colabore com sua equipe eficientemente' },
                    { icon: 'cog', title: 'Configurações', desc: 'Personalize sua experiência' }
                ].map((item, i) => (
                    <div key={i} className="card-custom p-6 rounded-lg">
                        <div className="text-4xl mb-4 text-gradient">
                            <i className={`fas fa-${item.icon}`}></i>
                        </div>
                        <h3 className="text-lg font-bold text-white mb-2">{item.title}</h3>
                        <p className="text-sm text-gray-400">{item.desc}</p>
                    </div>
                ))}
            </div>

            {/* Controle Autoplay */}
            <div className="flex justify-center">
                <button 
                    onClick={() => setIsAutoPlay(!isAutoPlay)}
                    className={`btn-primary px-8 py-3 rounded-lg font-medium transition-all hover:scale-105 ${
                        !isAutoPlay && 'opacity-50'
                    }`}
                >
                    <i className={`fas fa-${isAutoPlay ? 'pause' : 'play'} mr-2`}></i>
                    {isAutoPlay ? 'Pausar' : 'Retomar'} Autoplay
                </button>
            </div>
        </div>
    );
}

ReactDOM.render(<Carrossel />, document.getElementById('carrossel-app'));
</script>
{% endblock %}
